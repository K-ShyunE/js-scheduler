<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온에어 플래너 (On-Air Planner)</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined' !important;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #fbf9f8;
          z-index: 9999;
          font-family: 'Hanken Grotesk', 'Inter', sans-serif;
        }
        .loader-brand {
          font-size: 24px;
          font-weight: 700;
          color: #1b1c1b;
          margin-bottom: 32px;
          letter-spacing: -0.02em;
          animation: fade-in 0.5s ease-out forwards;
        }
        .progress-track {
          width: 280px;
          height: 4px;
          background-color: #e5e1e0;
          border-radius: 4px;
          overflow: hidden;
          opacity: 0;
          animation: fade-in 0.5s ease-out 0.2s forwards;
        }
        .progress-bar {
          height: 100%;
          background-color: #a93539;
          border-radius: 4px;
          width: 0%;
          animation: progress-load 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes progress-load {
          0% { width: 0%; }
          20% { width: 30%; }
          60% { width: 70%; }
          100% { width: 95%; }
        }
        @keyframes fade-in {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
      </style>
      <div id="initial-loader">
        <div class="loader-brand">JS Scheduler</div>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
