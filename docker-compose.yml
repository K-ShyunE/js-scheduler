services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev:host

  api:
    build: .
    ports:
      - "8787:8787"
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev:api


volumes:
  node_modules:

